plugins:
  - dependency: "dev.lavalink.youtube:youtube-plugin:1.11.5"
    snapshot: false
  - dependency: "com.github.topi314.lavasrc:lavasrc-plugin:4.4.1"
    repository: "https://maven.lavalink.dev/releases"
    snapshot: false

server: # REST and WS server
  port: 2333
  address: 0.0.0.0

lavalink:
  server:
    password: "youshallnotpass"
    sources:
      youtube: false # using plugin
      bandcamp: true
      soundcloud: true
      twitch: true
      vimeo: true
      http: true
      local: true
    filters: 
      volume: true
      equalizer: true
      karaoke: true
      timescale: true
      tremolo: true
      vibrato: true
      distortion: true
      rotation: true
      channelMix: true
      lowPass: true

  pluginsDir: "./plugins"

plugins:
  youtube:
    enabled: true
    allowSearch: true
    allowDirectVideoIds: true
    allowDirectPlaylistIds: true
    clients:
      - MUSIC
      - ANDROID_VR
      - WEB
  lavasrc:
    providers:
      - "ytsearch:\"%ISRC%\"" 
      - "ytsearch:%QUERY%"
    sources:
      spotify: true
      applemusic: true
      deezer: true
      yandexmusic: true
      flowerytts: false
      youtube: true
